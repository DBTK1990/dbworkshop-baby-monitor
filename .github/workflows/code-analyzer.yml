name: Code Analyzer

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (compile check)
        id: build
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log
        continue-on-error: true

      - name: Emit build failure annotation
        if: steps.build.outcome == 'failure'
        run: |
          # Extract first error line for a concise annotation
          ERROR=$(grep -m1 "error:" build.log || echo "Build failed — see log for details")
          echo "::error title=Build failed::$ERROR"

      - name: Run Android lint
        id: lint
        run: ./gradlew lintDebug --no-daemon 2>&1 | tee lint-output.log
        continue-on-error: true

      - name: Parse lint results and emit annotations
        id: parse_lint
        run: |
          REPORT="app/build/reports/lint-results-debug.xml"
          if [ ! -f "$REPORT" ]; then
            echo "lint_summary=Lint report not generated." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 - "$REPORT" <<'PYEOF'
          import sys, xml.etree.ElementTree as ET, os

          report = sys.argv[1]
          tree = ET.parse(report)
          root = tree.getroot()

          errors = 0
          warnings = 0

          for issue in root.findall("issue"):
              severity = issue.get("severity", "").lower()
              summary = issue.get("summary", "")
              explanation = issue.get("message", summary)
              loc = issue.find("location")
              if loc is not None:
                  file_path = loc.get("file", "")
                  line = loc.get("line", "1")
                  # Make path relative to repo root
                  workspace = os.environ.get("GITHUB_WORKSPACE", "")
                  if workspace and file_path.startswith(workspace):
                      file_path = file_path[len(workspace):].lstrip("/")
                  if severity == "error" or severity == "fatal":
                      print(f"::error file={file_path},line={line},title=Lint Error::{summary}")
                      errors += 1
                  elif severity == "warning":
                      print(f"::warning file={file_path},line={line},title=Lint Warning::{summary}")
                      warnings += 1
              else:
                  if severity in ("error", "fatal"):
                      print(f"::error title=Lint Error::{summary}")
                      errors += 1
                  elif severity == "warning":
                      print(f"::warning title=Lint Warning::{summary}")
                      warnings += 1

          summary = f"{errors} error(s), {warnings} warning(s)"
          print(f"Lint summary: {summary}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"lint_summary={summary}\n")
              f.write(f"lint_errors={errors}\n")
          PYEOF

      - name: Upload lint HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Post PR comment with summary
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          LINT_SUMMARY: ${{ steps.parse_lint.outputs.lint_summary }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.error

          build_outcome = os.environ.get("BUILD_OUTCOME", "unknown")
          lint_summary = os.environ.get("LINT_SUMMARY", "N/A")

          build_icon = "\u2705" if build_outcome == "success" else "\u274c"
          lines = [
              "## \U0001f527 Code Analyzer Results\n",
              f"| Check | Result |",
              f"|-------|--------|",
              f"| Build (`assembleDebug`) | {build_icon} {build_outcome} |",
              f"| Android Lint | {lint_summary} |",
          ]
          if build_outcome != "success":
              lines.append("\n> \u26a0\ufe0f Build failed. Check the **Build** step logs and annotations above.")
          comment_body = "\n".join(lines)

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
          payload = json.dumps({"body": comment_body}).encode()
          req = urllib.request.Request(
              url,
              data=payload,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Comment posted: {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"Failed to post comment: {e.code} {e.read().decode()}")
          PYEOF

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Fail if lint errors found
        if: steps.parse_lint.outputs.lint_errors != '0' && steps.parse_lint.outputs.lint_errors != ''
        run: |
          echo "Lint reported ${{ steps.parse_lint.outputs.lint_errors }} error(s)."
          exit 1
