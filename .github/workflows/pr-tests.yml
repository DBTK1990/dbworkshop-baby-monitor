name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ── Job 1: JVM / Robolectric unit tests ─────────────────────────────────────
  # These run entirely on the JVM (no device/emulator required) and are fast.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

  # ── Job 2: Instrumented tests (RTSP end-to-end) ──────────────────────────────
  # Runs RtspStreamTest on an Android emulator with a virtual camera.
  # The test starts StreamingService, waits for port 8554, then sends RTSP
  # OPTIONS / DESCRIBE requests and asserts valid server responses.
  instrumented-tests:
    name: Instrumented Tests (RTSP)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM (hardware acceleration for emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build debug APK and test APK
        run: ./gradlew assembleDebug assembleDebugAndroidTest --no-daemon

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # API 29 (Android 10) — oldest API where foreground service types are enforced,
          # matching minSdk=24 while keeping boot time reasonable on CI.
          api-level: 29
          arch: x86_64
          target: default
          # Virtual scene camera allows StreamingService to open the camera on the AVD.
          camera-back: virtualscene
          camera-front: emulated
          disable-animations: true
          emulator-options: -no-snapshot -no-audio -no-boot-anim
          script: ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/connected/
          if-no-files-found: ignore
