name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set release tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/signing-key.jks"

      - name: Create signing.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Trim leading/trailing whitespace from secrets to guard against accidental spaces
          TRIMMED_STORE_PASSWORD="$(printf '%s' "${STORE_PASSWORD}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          TRIMMED_KEY_ALIAS="$(printf '%s' "${KEY_ALIAS}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          TRIMMED_KEY_PASSWORD="$(printf '%s' "${KEY_PASSWORD}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          cat > signing.properties <<EOF
          storeFile=${{ github.workspace }}/signing-key.jks
          storePassword=${TRIMMED_STORE_PASSWORD}
          keyAlias=${TRIMMED_KEY_ALIAS}
          keyPassword=${TRIMMED_KEY_PASSWORD}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APKs
        run: ./gradlew assembleRelease

      - name: Collect APKs
        id: apks
        run: |
          APK_DIR="app/build/outputs/apk/release"
          echo "Found APKs:"
          ls "$APK_DIR"/*.apk
          echo "apk_dir=$APK_DIR" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: ${{ steps.apks.outputs.apk_dir }}/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up signing artifacts
        if: always()
        run: |
          rm -f signing-key.jks signing.properties
