name: Copilot PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot review
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          copilot -p "Review the git diff between HEAD and origin/$BASE_REF using git. Write a concise code review as GitHub-flavoured Markdown: a short summary (max 100 words) followed by bullet points covering correctness, security, performance, and Android/Kotlin best practices. Reference file names and line numbers where relevant. Write the review to review.md" \
            --allow-tool='shell(git:*)' \
            --allow-tool=write \
            --no-ask-user
          cat review.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post review as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file review.md
