name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "Diff size: $(wc -c < pr_diff.txt) bytes"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Run Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import anthropic, json, os, urllib.request, urllib.error

          with open("pr_diff.txt", "r", errors="replace") as f:
              diff = f.read(60000)
          if len(diff) == 60000:
              diff += "\n\n[diff truncated at 60 000 chars]"

          client = anthropic.Anthropic()
          response = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=2048,
              system=[{
                  "type": "text",
                  "text": (
                      "You are an expert Android/Kotlin code reviewer. "
                      "Review the following pull request diff and provide concise, actionable feedback. "
                      "Focus on: correctness, security, performance, and Android best practices. "
                      "Format the response as GitHub-flavoured Markdown. "
                      "Be specific — reference file names and line numbers where relevant. "
                      "If the change looks good overall, say so briefly."
                  ),
                  "cache_control": {"type": "ephemeral"},
              }],
              messages=[{
                  "role": "user",
                  "content": f"Please review this pull request:\n\n```diff\n{diff}\n```",
              }],
          )
          review_text = response.content[0].text

          comment_body = f"## \U0001f916 Claude Code Review\n\n{review_text}"

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
          payload = json.dumps({"body": comment_body}).encode()
          req = urllib.request.Request(
              url,
              data=payload,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Comment posted: {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"Failed to post comment: {e.code} {e.read().decode()}")
              raise
          PYEOF
